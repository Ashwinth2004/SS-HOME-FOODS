<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" width="480" height="440" role="img" aria-label="Traditional home cooking pot on stove">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/>
      <stop offset="45%" stop-color="#e0a83f"/>
      <stop offset="100%" stop-color="#b27d22"/>
    </linearGradient>
    <radialGradient id="brassBody" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="55%" stop-color="#e3ab43"/>
      <stop offset="100%" stop-color="#9c6c1c"/>
    </radialGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe7a8"/><stop offset="100%" stop-color="#c98f2a"/></linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ff9d2e"/><stop offset="60%" stop-color="#ff6a2c"/><stop offset="100%" stop-color="#ffd23e"/></linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#11331c" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Steam wisps (animated) -->
  <g fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round">
    <path d="M196 150 q-16 -34 4 -64 q14 -24 0 -52" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0" dur="3.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 14; 0 -40" dur="3.4s" repeatCount="indefinite"/>
    </path>
    <path d="M244 142 q16 -34 -4 -66 q-14 -24 0 -54" opacity="0">
      <animate attributeName="opacity" values="0;0.75;0" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 14; 0 -46" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M290 150 q-14 -32 6 -60 q12 -22 -2 -48" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 14; 0 -42" dur="3.1s" begin="1.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Pot -->
  <g filter="url(#ds)">
    <!-- handles -->
    <path d="M86 250 q-34 0 -34 30 q0 22 26 24" fill="none" stroke="url(#brass)" stroke-width="14" stroke-linecap="round"/>
    <path d="M394 250 q34 0 34 30 q0 22 -26 24" fill="none" stroke="url(#brass)" stroke-width="14" stroke-linecap="round"/>
    <!-- body -->
    <path d="M96 232 h288 a18 18 0 0 1 18 18 l-14 96 a40 40 0 0 1 -39 34 H131 a40 40 0 0 1 -39 -34 l-14 -96 a18 18 0 0 1 18 -18 Z" fill="url(#brassBody)"/>
    <!-- rim -->
    <ellipse cx="240" cy="234" rx="158" ry="26" fill="url(#brass)"/>
    <ellipse cx="240" cy="230" rx="150" ry="20" fill="#7a5417"/>
    <ellipse cx="240" cy="228" rx="150" ry="18" fill="#3a2810"/>
    <!-- food surface bubbling -->
    <ellipse cx="240" cy="228" rx="138" ry="15" fill="#b5611f"/>
    <ellipse cx="240" cy="226" rx="120" ry="12" fill="#d6792a"/>
    <g fill="#e89a45">
      <circle cx="200" cy="226" r="6"><animate attributeName="r" values="3;7;3" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="252" cy="224" r="5"><animate attributeName="r" values="2;6;2" dur="2.6s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="288" cy="228" r="4"><animate attributeName="r" values="2;5;2" dur="2.0s" begin="1s" repeatCount="indefinite"/></circle>
    </g>
    <!-- sheen -->
    <path d="M120 250 q10 70 40 96" fill="none" stroke="#fff3d6" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Stove + flames -->
  <g>
    <rect x="120" y="392" width="240" height="22" rx="11" fill="#33403a"/>
    <rect x="150" y="380" width="180" height="16" rx="8" fill="#46554d"/>
    <g fill="url(#flame)">
      <path d="M200 392 q-14 -26 0 -44 q6 14 14 8 q-2 18 -14 36 Z"><animateTransform attributeName="transform" type="scale" values="1 1;1 1.18;1 1" additive="sum" dur="0.8s" repeatCount="indefinite"/></path>
      <path d="M240 392 q-16 -32 2 -54 q6 16 16 10 q0 22 -18 44 Z"><animateTransform attributeName="transform" type="scale" values="1 1;1 1.22;1 1" additive="sum" dur="0.7s" begin="0.2s" repeatCount="indefinite"/></path>
      <path d="M282 392 q-14 -26 0 -44 q6 14 14 8 q-2 18 -14 36 Z"><animateTransform attributeName="transform" type="scale" values="1 1;1 1.16;1 1" additive="sum" dur="0.9s" begin="0.4s" repeatCount="indefinite"/></path>
    </g>
  </g>

  <!-- Spice bowls + garnish in front -->
  <g>
    <!-- turmeric -->
    <g transform="translate(96,372)"><ellipse cx="0" cy="0" rx="30" ry="14" fill="#cfd6d9"/><ellipse cx="0" cy="-3" rx="24" ry="10" fill="#f0b51d"/></g>
    <!-- chilli powder -->
    <g transform="translate(384,372)"><ellipse cx="0" cy="0" rx="30" ry="14" fill="#cfd6d9"/><ellipse cx="0" cy="-3" rx="24" ry="10" fill="#c8341d"/></g>
  </g>
  <!-- tomato, chilli, curry leaves -->
  <g>
    <circle cx="150" cy="418" r="13" fill="#e23b2e"/><path d="M150 406 q4 -6 8 -3" stroke="#3a8a3a" stroke-width="3" fill="none"/>
    <path d="M320 420 q22 -6 40 2 q-20 8 -40 -2 Z" fill="#3a9b34"/>
    <g fill="#2f8a3a"><ellipse cx="246" cy="424" rx="9" ry="4" transform="rotate(-18 246 424)"/><ellipse cx="262" cy="426" rx="9" ry="4" transform="rotate(16 262 426)"/></g>
  </g>
</svg>
